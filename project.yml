name: CaffeinateBar
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

targets:
  CaffeinateBar:
    type: application
    platform: macOS
    sources:
      - CaffeinateBar
    dependencies:
      - sdk: IOKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.CaffeinateBar
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: CaffeinateBar/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: CaffeinateBar/Info.plist
      properties:
        CFBundleName: CaffeinateBar
        CFBundleDisplayName: CaffeinateBar
        CFBundleIdentifier: com.local.CaffeinateBar
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHumanReadableCopyright: ""
