name: CaffeinateBar
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

targets:
  CaffeinateBar:
    type: application
    platform: macOS
    sources:
      - CaffeinateBar
    dependencies:
      - sdk: IOKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.CaffeinateBar
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: CaffeinateBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: CaffeinateBar/CaffeinateBar.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: CaffeinateBar/Info.plist
      properties:
        CFBundleName: CaffeinateBar
        CFBundleDisplayName: CaffeinateBar
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundlePackageType: APPL
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSHumanReadableCopyright: ""
